name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
            artifact: exe
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ''
            artifact: dmg
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ''
            artifact: dmg
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: ''
            artifact: deb

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build binary
        run: |
          set -e
          echo "Building for target: ${{ matrix.target }}"
          cd rust
          cargo build --release \
            --target ${{ matrix.target }} \
            -p build-lod \
            --no-default-features
        shell: bash

      - name: Verify binary exists
        run: |
          BINARY_PATH="rust/target/${{ matrix.target }}/release/build-lod${{ matrix.ext }}"
          if [ ! -f "$BINARY_PATH" ]; then
            echo "ERROR: Binary not found at $BINARY_PATH"
            echo "Listing target directory contents:"
            ls -la rust/target/ || echo "target dir not found"
            ls -la rust/target/${{ matrix.target }}/ || echo "target/${{ matrix.target }} dir not found"
            ls -la rust/target/${{ matrix.target }}/release/ || echo "release dir not found"
            exit 1
          fi
          echo "Binary found: $BINARY_PATH"
          ls -la "$BINARY_PATH"
        shell: bash

      # Windows: 直接上传 exe
      - name: Prepare Windows artifact
        if: matrix.artifact == 'exe'
        run: |
          mkdir -p artifacts
          cp rust/target/${{ matrix.target }}/release/build-lod.exe artifacts/build-lod-${{ matrix.target }}.exe
          ls -la artifacts/
        shell: bash

      # macOS: 创建 dmg
      - name: Create macOS dmg
        if: matrix.artifact == 'dmg'
        run: |
          BINARY_PATH="rust/target/${{ matrix.target }}/release/build-lod"
          DMG_NAME="build-lod-${{ matrix.target }}.dmg"

          mkdir -p artifacts
          mkdir -p dmg_temp

          # Copy binary to temp folder
          cp "$BINARY_PATH" dmg_temp/build-lod

          # Create dmg using hdiutil (more reliable)
          hdiutil create -volname "build-lod" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "$DMG_NAME"

          rm -rf dmg_temp
          mv "$DMG_NAME" artifacts/
          ls -la artifacts/
        shell: bash

      # Linux: 创建 deb
      - name: Install cargo-deb
        if: matrix.artifact == 'deb'
        run: cargo install cargo-deb

      - name: Create Linux deb
        if: matrix.artifact == 'deb'
        run: |
          set -e
          mkdir -p artifacts

          cd rust

          # Try cargo-deb
          cargo deb --target ${{ matrix.target }} -p build-lod --no-build --output ../artifacts/build-lod-${{ matrix.target }}.deb || {
            echo "cargo-deb failed, using manual deb creation"

            BINARY_PATH="target/${{ matrix.target }}/release/build-lod"
            DEB_DIR="deb_package"

            mkdir -p "$DEB_DIR/usr/bin"
            mkdir -p "$DEB_DIR/DEBIAN"

            cp "$BINARY_PATH" "$DEB_DIR/usr/bin/build-lod"

            cat > "$DEB_DIR/DEBIAN/control" << 'EOF'
          Package: build-lod
          Version: 0.1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: World Labs Technologies
          Description: PLY to RAD converter with LOD support
          EOF

            dpkg-deb --build "$DEB_DIR" "../artifacts/build-lod-${{ matrix.target }}.deb"
            rm -rf "$DEB_DIR"
          }

          cd ..
          echo "Artifacts:"
          ls -la artifacts/
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}