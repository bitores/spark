name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: x86_64-apple-darwin
            os: macos-13
            ext: ''
          - target: aarch64-apple-darwin
            os: macos-14
            ext: ''
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: true
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --manifest-path rust/build-lod/Cargo.toml --no-default-features
          else
            cargo build --release --target ${{ matrix.target }} --manifest-path rust/build-lod/Cargo.toml --no-default-features
          fi
        shell: bash

      - name: Package
        run: |
          cd rust/build-lod/target/${{ matrix.target }}/release
          mkdir -p artifact
          cp build-lod${{ matrix.ext }} artifact/
          cd artifact
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            7z a build-lod-${{ matrix.target }}.zip build-lod${{ matrix.ext }}
          else
            tar -czvf build-lod-${{ matrix.target }}.tar.gz build-lod${{ matrix.ext }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-lod-${{ matrix.target }}
          path: rust/build-lod/target/${{ matrix.target }}/release/artifact/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}